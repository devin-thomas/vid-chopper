name: CI

on:
  push:
    branches:
      - main
      - app-foundation
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check unqualified size_t style
        run: |
          matches=$(grep -RIn --include='*.cpp' --include='*.hpp' --include='*.md' 'std::size_t' src tests AGENTS.md CODING_STYLE.md \
            | grep -v '^src/core/types.hpp:.*using std::size_t;' || true)
          if [ -n "$matches" ]; then
            echo "$matches"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install GCC 13 (libstdc++ with std::format)
        run: sudo apt-get update && sudo apt-get install -y g++-13

      - name: Install clang-format and clang-tidy (pinned)
        run: python -m pip install "clang-format==18.1.8" "clang-tidy==18.1.8"

      - name: Check formatting (clang-format)
        run: |
          mapfile -t files < <(find src tests -name '*.cpp' -o -name '*.hpp')
          clang-format --dry-run --Werror "${files[@]}"

      - name: Lint core (clang-tidy)
        run: |
          for f in src/core/*.cpp; do
            echo "::group::clang-tidy $f"
            clang-tidy "$f" -- -std=c++20 -Isrc \
              --gcc-install-dir=/usr/lib/gcc/x86_64-linux-gnu/13
            echo "::endgroup::"
          done

  core-tests:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: lukka/get-cmake@v4.3.3

      - name: Set up vcpkg dependencies
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ runner.workspace }}/b/vcpkg'
          vcpkgJsonGlob: '**/vcpkg.json'
          runVcpkgInstall: false

      - name: Install FFmpeg
        shell: pwsh
        run: |
          $attempts = 5
          for ($i = 1; $i -le $attempts; $i++) {
            Write-Host "Installing ffmpeg (attempt $i/$attempts)..."
            choco install ffmpeg --version=7.1.1 --yes --no-progress
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "choco install failed with exit code $LASTEXITCODE (likely a transient chocolatey.org outage); retrying in 30s..."
            Start-Sleep -Seconds 30
          }
          Write-Error "ffmpeg install failed after $attempts attempts"
          exit 1

      - name: Configure core-only build
        run: cmake --preset core-release

      - name: Build core-only targets
        run: cmake --build --preset core-release

      - name: Run fast tests
        run: ctest --test-dir build/core-release -C Release -L fast --output-on-failure

      - name: Run slow tests
        run: ctest --test-dir build/core-release -C Release -L slow --output-on-failure

  gui-build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: lukka/get-cmake@v4.3.3

      - name: Set up vcpkg dependencies
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ runner.workspace }}/b/vcpkg'
          vcpkgJsonGlob: '**/vcpkg.json'
          runVcpkgInstall: false

      - name: Install Qt 6.9
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.9.0
          host: windows
          target: desktop

      - name: Configure GUI build
        run: cmake --preset windows-gui-release

      - name: Build VidChopper
        run: cmake --build --preset windows-gui-release
