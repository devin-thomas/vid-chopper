name: Format size_t style

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install clang-format
        run: python -m pip install "clang-format==18.1.8"

      - name: Format C++ files
        shell: bash
        run: |
          mapfile -t files < <(find src tests -name '*.cpp' -o -name '*.hpp')
          clang-format -i "${files[@]}"

      - name: Commit directly to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format unqualified size_t sweep"
          git push origin HEAD:main
