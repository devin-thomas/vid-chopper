name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-2022
    env:
      RELEASE_DIR: dist\VidChopper

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Compute release asset metadata
        id: release_meta
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $version = if ($tag.StartsWith("v")) { $tag.Substring(1) } else { $tag }
          $assetName = "VidChopper-$version-windows-x64.zip"

          "release_version=$version" >> $env:GITHUB_OUTPUT
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT
          "asset_path=dist\$assetName" >> $env:GITHUB_OUTPUT

      - name: Set up CMake
        uses: lukka/get-cmake@v4.3.3

      - name: Set up vcpkg dependencies
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ runner.workspace }}/b/vcpkg'
          vcpkgJsonGlob: '${{ github.workspace }}/vcpkg.json'

      - name: Install Qt 6.9
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.9.0
          host: windows
          target: desktop

      - name: Configure GUI build
        run: cmake --preset windows-gui-release -DVIDCHOPPER_DISPLAY_VERSION=${{ steps.release_meta.outputs.release_version }}

      - name: Build VidChopper
        run: cmake --build --preset windows-gui-release

      - name: Run tests before packaging
        run: |
          cmake --preset core-release
          cmake --build --preset core-release
          ctest --test-dir build/core-release -C Release -L fast --output-on-failure

      - name: Package portable Windows zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $appDir = Join-Path $PWD $env:RELEASE_DIR
          $exePath = Join-Path $PWD "build/windows-gui-release/Release/VidChopper.exe"
          $zipPath = Join-Path $PWD "${{ steps.release_meta.outputs.asset_path }}"

          if (!(Test-Path $exePath)) {
            throw "Built executable not found at $exePath"
          }

          New-Item -ItemType Directory -Force -Path $appDir | Out-Null
          Copy-Item $exePath -Destination $appDir -Force
          Copy-Item "packaging/windows/README.txt" -Destination (Join-Path $appDir "README.txt") -Force
          Copy-Item "packaging/windows/THIRD_PARTY_NOTICES.txt" -Destination $appDir -Force
          Copy-Item "LICENSE" -Destination $appDir -Force

          windeployqt --release --compiler-runtime --no-translations --dir $appDir (Join-Path $appDir "VidChopper.exe")
          Compress-Archive -Path (Join-Path $appDir "*") -DestinationPath $zipPath -Force

      - name: Upload packaged zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vidchopper-windows-x64-${{ steps.release_meta.outputs.release_version }}
          path: ${{ steps.release_meta.outputs.asset_path }}

      - name: Attach zip to GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.release_meta.outputs.asset_path }}" --clobber
